version: '3.8'

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: nidar_root_pass
      MYSQL_DATABASE: nidar_db
      MYSQL_USER: nidar
      MYSQL_PASSWORD: nidar_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      - MQTT_BROKER=mqtt
      - MYSQL_HOST=mysql
      - MYSQL_USER=nidar
      - MYSQL_PASSWORD=nidar_pass
      - MYSQL_DATABASE=nidar_db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    stdin_open: true

volumes:
  mysql_data:
